<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPOP Album Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav>
<div class="logo">KPOP STORE</div>

<ul class="menu">
<li><a href="#home">Home</a></li>
<li><a href="#produk">Album</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- Home -->
<section id="home" class="home">
<h1>Welcome to KPOP Album Store</h1>
<p>Beli album BTS, BLACKPINK, TXT, ILLIT, ENHYPEN original</p>
</section>

<!-- Produk -->
<section id="produk" class="produk">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>BTS Album</h3>
<p class="price">Rp 350.000</p>
<button onclick="cart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>BLACKPINK Album</h3>
<p class="price">Rp 330.000</p>
<button onclick="cart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>TXT Album</h3>
<p class="price">Rp 300.000</p>
<button onclick="cart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>ILLIT Album</h3>
<p class="price">Rp 280.000</p>
<button onclick="cart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>ENHYPEN Album</h3>
<p class="price">Rp 320.000</p>
<button onclick="cart()">Add to Cart</button>
</div>

</section>

<!-- Contact -->
<footer id="contact">
<p>© 2026 KPOP Album Store</p>
</footer>

<script src="script.js"></script>

</body>
</html>
